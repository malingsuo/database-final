worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    types {
        application/javascript mjs;
    }

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    upstream auth_backend {
        server auth:8000;
    }

    upstream main_backend {
        server backend:8080;
    }

    server {
        listen 80;
        server_name localhost;

        set $should_redirect 0;

        # =========================================================
        # Frontend
        # =========================================================
        location / {
            set $redirect_scheme $scheme;
            if ($http_x_forwarded_proto != "") {
                set $redirect_scheme $http_x_forwarded_proto;
            }

            if ($should_redirect = 1) {
                return 301 $redirect_scheme://$http_host$uri/$is_args$args;
            }

            proxy_pass http://frontend:3000;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # =========================================================
        # Public Auth APIs
        # =========================================================
        location /api/auth/ {

            if ($request_method = OPTIONS) {
                return 204;
            }

            auth_request off;

            proxy_pass http://auth_backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_set_header Cookie $http_cookie;

            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        }

        # =========================================================
        # Protected APIs
        # =========================================================
        location /api/ {

            if ($request_method = OPTIONS) {
                return 204;
            }

            # Validate JWT
            auth_request /_validate_token;

            # Read headers returned from auth service
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $email $upstream_http_x_email;

            # Forward identity to backend
            proxy_set_header X-User-ID $user_id;
            proxy_set_header X-Email $email;

            # Optional: forward original JWT too
            proxy_set_header Authorization $http_authorization;

            proxy_set_header X-Installation-ID $http_x_installation_id;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;

            proxy_pass http://main_backend;
        }

        # =========================================================
        # Internal token validation endpoint
        # =========================================================
        location = /_validate_token {
            internal;

            proxy_pass_request_body off;
            proxy_set_header Content-Length "";

            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;

            proxy_pass http://auth_backend/auth/validate;
        }

        # =========================================================
        # Auth failure response
        # =========================================================
        error_page 401 403 = @unauthorized;

        location @unauthorized {
            default_type application/json;

            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;

            return 401 '{"status":"error","message":"Unauthorized"}';
        }
    }
}
