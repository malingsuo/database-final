info:
  name: Delete User
  type: http
  seq: 5

http:
  method: DELETE
  url: "{{baseUrl}}/api/auth/user/{{account_id}}"
  auth: inherit

runtime:
  variables:
    - name: account_id
      value: 0792eedc-3e1e-4444-a825-bb6628c1dd3b

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: example
    request:
      url: "{{baseUrl}}/api/auth/user/{{account_id}}"
      method: DELETE
    response:
      status: 200
      statusText: OK
      headers:
        - name: server
          value: nginx
        - name: date
          value: Fri, 29 May 2026 16:22:06 GMT
        - name: content-type
          value: application/json
        - name: content-length
          value: "29"
        - name: connection
          value: keep-alive
        - name: access-control-allow-origin
          value: "*"
        - name: access-control-allow-headers
          value: Authorization, Content-Type, X-Requested-With
        - name: access-control-allow-methods
          value: GET, POST, PUT, DELETE, OPTIONS
      body:
        type: json
        data: |-
          {
            "message": "Account deleted"
          }

docs: |
  Revoke the current token.

  **Headers**
  ```
  Authorization: Bearer <token>
  ```

  **Response `200`**
  ```json
  { "message": "Logged out" }
  ```
