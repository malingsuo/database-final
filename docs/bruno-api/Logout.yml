info:
  name: Logout
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/api/auth/logout"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: example
    request:
      url: "{{baseUrl}}/api/auth/logout"
      method: POST
    response:
      status: 200
      statusText: OK
      headers:
        - name: server
          value: nginx
        - name: date
          value: Fri, 29 May 2026 13:04:43 GMT
        - name: content-type
          value: application/json
        - name: content-length
          value: "24"
        - name: connection
          value: keep-alive
        - name: access-control-allow-origin
          value: "*"
        - name: access-control-allow-headers
          value: Authorization, Content-Type, X-Requested-With
        - name: access-control-allow-methods
          value: GET, POST, PUT, DELETE, OPTIONS
      body:
        type: json
        data: |-
          {
            "message": "Logged out"
          }
