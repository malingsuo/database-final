services:
  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile
      args:
        NONROOT_USERNAME: ubuntu
        PROJECT_PATH: /project/database-final/auth
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      - db
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        NONROOT_USERNAME: ubuntu
        PROJECT_PATH: /project/database-final/backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      - db
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
  nginx:
    image: nginx:latest
    ports:
      - "5000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth
      - backend
      - frontend
  db:
    image: postgres:18
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - ./db:/docker-entrypoint-initdb.d
      - pg_data:/var/lib/postgresql/18/docker

volumes:
  pg_data:
